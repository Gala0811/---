<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Викторина - Тревожный рюкзак</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            padding: 20px;
            text-align: center;
        }
        .box {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #f57c00;
        }
        .question {
            font-size: 22px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        .correct {
            background: rgba(76,175,80,0.3);
            color: #4caf50;
            padding: 15px;
            border-radius: 10px;
        }
        .wrong {
            background: rgba(244,67,54,0.3);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
        }
        .result {
            font-size: 24px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🎒 Викторина: Тревожный рюкзак</h1>
    <p>Что нужно взять с собой в экстренной ситуации?</p>
    
    <div id="game"></div>
</div>

<script>
// СПИСОК ВСЕХ ВОПРОСОВ (ПЕРЕМЕШАН)
const вопросы = [
    {
        текст: "🧸 Любимая мягкая игрушка",
        правильный: false,
        пояснение: "Игрушка успокаивает, но занимает место. Лучше взять что-то полезное."
    },
    {
        текст: "🔋 Пауэрбанк для телефона",
        правильный: true,
        пояснение: "Зарядка для телефона нужна, чтобы оставаться на связи."
    },
    {
        текст: "📻 Большое радио (как в старых приёмниках)",
        правильный: false,
        пояснение: "Оно слишком громоздкое и тяжёлое. Лучше маленькое портативное радио."
    },
    {
        текст: "💧 Бутылка воды 1.5 литра",
        правильный: true,
        пояснение: "Вода — самое важное! Без воды человек не проживёт и 3 дней."
    },
    {
        текст: "📖 Книга «Выживание в лесу» 600 страниц",
        правильный: false,
        пояснение: "Полезно, но очень тяжело тащить. Карманный справочник весит меньше."
    },
    {
        текст: "🏥 Аптечка первой помощи (бинт, пластырь, жгут, салфетки)",
        правильный: true,
        пояснение: "Аптечка обязательна! При травме может спасти жизнь."
    },
    {
        текст: "🎮 Планшет с играми",
        правильный: false,
        пояснение: "Планшет разрядится за пару часов. Зарядку важнее для связи."
    },
    {
        текст: "💊 Лекарства, которые вы принимаете каждый день",
        правильный: true,
        пояснение: "Личные лекарства нужно взять с собой на несколько дней."
    },
    {
        текст: "📓 Блокнот с отрывными страницами 500 листов",
        правильный: false,
        пояснение: "Слишком толстый и тяжёлый. Хватит маленького блокнота на 50 листов."
    },
    {
        текст: "🔦 Фонарик с динамо-зарядкой (без батареек)",
        правильный: true,
        пояснение: "Фонарик с динамо не требует батареек — надёжнее в экстренной ситуации."
    },
    {
        текст: "🍾 Стеклянная бутылка вина",
        правильный: false,
        пояснение: "Вино не утоляет жажду, а бутылка тяжёлая и бьётся."
    },
    {
        текст: "📰 Паспорт и документы",
        правильный: true,
        пояснение: "Документы нужны для идентификации и получения помощи."
    },
    {
        текст: "💨 Фен от влаги",
        правильный: false,
        пояснение: "Тяжёлый, требует розетки. Полотенце весит меньше и не требует электричества."
    },
    {
        текст: "🍫 Энергетический батончик",
        правильный: true,
        пояснение: "Компактная еда с калориями. Можно взять несколько."
    },
    {
        текст: "📚 Толстый роман 'Война и мир'",
        правильный: false,
        пояснение: "Книга слишком тяжёлая. Лучше взять блокнот и ручку."
    },
    {
        текст: "🧥 Тёплая кофта",
        правильный: true,
        пояснение: "Тёплая одежда спасёт от холода, даже летом ночью прохладно."
    },
    {
        текст: "🌂 Тяжёлый зонт-трость",
        правильный: false,
        пояснение: "Он слишком громоздкий. Компактный дождевик весит меньше и занимает меньше места."
    },
    {
        текст: "📻 Маленькое радио на батарейках",
        правильный: true,
        пояснение: "Радио — основной источник новостей, когда нет интернета. Компактное — не перегружает."
    },
    {
        текст: "🏋️ Гантель 5 кг",
        правильный: false,
        пояснение: "Гантель — бесполезный груз. Она только отнимает силы."
    },
    {
        текст: "💰 Наличные деньги мелкими купюрами",
        правильный: true,
        пояснение: "Деньги нужны на случай, если терминалы не работают."
    },
    {
        текст: "📸 Дорогой фотоаппарат",
        правильный: false,
        пояснение: "Фотоаппарат тяжёлый и хрупкий. Тревога — не время для фотосессий."
    },
    {
        текст: "🧴 Зубная щётка и паста",
        правильный: true,
        пояснение: "Гигиена важна даже в экстренной ситуации."
    },
    {
        текст: "☕ Термос с горячим чаем (1,5 литра)",
        правильный: false,
        пояснение: "Тяжёлый, быстро остывает. Лучше взять воду и таблетки для обеззараживания."
    },
    {
        текст: "🧦 Тёплые носки",
        правильный: true,
        пояснение: "Сухие тёплые носки спасают от обморожения и мозолей."
    },
    {
        текст: "💄 Косметичка с макияжем",
        правильный: false,
        пояснение: "Макияж не спасёт жизнь. Это лишний вес и место."
    },
    {
        текст: "🗡️ Мультитул (складной нож с инструментами)",
        правильный: true,
        пояснение: "Мультитул поможет открыть консервы, перерезать верёвку, открутить винт."
    },
    {
        текст: "🕯️ Свечи или сухое горючее (для розжига)",
        правильный: true,
        пояснение: "Помогут разжечь костёр или согреться в укрытии."
    }
];

let текущийВопрос = 0;
let правильныеОтветы = 0;
let играАктивна = true;
let таймер;

function показатьВопрос() {
    if (таймер) clearTimeout(таймер);
    
    if (текущийВопрос >= вопросы.length) {
        let процент = Math.round((правильныеОтветы / вопросы.length) * 100);
        let оценка = "";
        
        if (процент >= 80) оценка = "🏆 Отлично! Ты готова к любой ситуации! 🏆";
        else if (процент >= 60) оценка = "👍 Хорошо, но стоит повторить список.";
        else оценка = "📚 Стоит изучить, что действительно нужно в рюкзаке.";
        
        document.getElementById("game").innerHTML = `
            <div class="result">🎉 Викторина окончена! 🎉</div>
            <div class="correct">Правильных ответов: ${правильныеОтветы} из ${вопросы.length} (${процент}%)</div>
            <div style="margin: 20px;">${оценка}</div>
            <button onclick="начатьЗаново()">🔄 Пройти заново</button>
        `;
        return;
    }
    
    let q = вопросы[текущийВопрос];
    
    let html = `
        <div class="question">
            ❓ Нужно ли класть в тревожный рюкзак:<br>
            <strong>${q.текст}</strong>?
        </div>
        <div>
            <button onclick="ответить(true)">✅ Да, нужно</button>
            <button onclick="ответить(false)">❌ Нет, не нужно</button>
        </div>
        <div id="пояснение" style="margin-top: 20px;"></div>
        <div style="margin-top: 20px;">Вопрос ${текущийВопрос + 1} из ${вопросы.length}</div>
    `;
    
    document.getElementById("game").innerHTML = html;
    играАктивна = true;
}

function ответить(ответ) {
    if (!играАктивна) return;
    
    играАктивна = false;
    let q = вопросы[текущийВопрос];
    let пояснениеDiv = document.getElementById("пояснение");
    
    if (ответ === q.правильный) {
        правильныеОтветы++;
        пояснениеDiv.innerHTML = `<div class="correct">✅ ПРАВИЛЬНО! ${q.пояснение}</div>`;
    } else {
        пояснениеDiv.innerHTML = `<div class="wrong">❌ НЕПРАВИЛЬНО! ${q.пояснение}</div>`;
    }
    
    текущийВопрос++;
    таймер = setTimeout(показатьВопрос, 4000);
}

function начатьЗаново() {
    if (таймер) clearTimeout(таймер);
    текущийВопрос = 0;
    правильныеОтветы = 0;
    играАктивна = true;
    показатьВопрос();
}

показатьВопрос();
</script>

</body>
</html>
